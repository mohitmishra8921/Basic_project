<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="game.css" />
</head>
<body>

  <div class="container">
    <h1>Rock Paper Scissors</h1>

    <div class="scoreboard">
      <div class="score-box">
        <span class="score-label">You</span>
        <span class="score-num" id="player-score">0</span>
      </div>
      <div class="score-box draws">
        <span class="score-label">Draws</span>
        <span class="score-num" id="draw-score">0</span>
      </div>
      <div class="score-box">
        <span class="score-label">Computer</span>
        <span class="score-num" id="computer-score">0</span>
      </div>
    </div>

    <p class="instruction">Choose your move!</p>

    <div class="choices">
      <button class="choice-btn" onclick="play('rock')" title="Rock">
        <span>🪨</span>
        <p>Rock</p>
      </button>
      <button class="choice-btn" onclick="play('paper')" title="Paper">
        <span>📄</span>
        <p>Paper</p>
      </button>
      <button class="choice-btn" onclick="play('scissors')" title="Scissors">
        <span>✂️</span>
        <p>Scissors</p>
      </button>
    </div>

    <div class="result-area" id="result-area">
      <div class="versus">
        <div class="pick">
          <p>You picked</p>
          <span id="player-pick">❓</span>
        </div>
        <span class="vs">VS</span>
        <div class="pick">
          <p>Computer picked</p>
          <span id="computer-pick">❓</span>
        </div>
      </div>
      <p class="result-text" id="result-text">Make your move!</p>
    </div>

    <button class="reset-btn" onclick="resetGame()">🔄 Reset Score</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
